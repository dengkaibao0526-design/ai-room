name: Android Debug APK

on:
  pull_request:
    paths:
      - "android/**"
      - "components/MobileSpatialSensor.jsx"
      - "components/NativeShareBridge.jsx"
      - "app/components/chat/MobileTools.js"
      - "app/layout.js"
      - ".github/workflows/android-debug.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Gradle 8.9
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$HOME"
          echo "$HOME/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Assemble debug APK
        id: assemble
        continue-on-error: true
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon :app:assembleDebug 2>&1 | tee "$RUNNER_TEMP/android-build.log"

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xiaokb-android-build-log
          path: ${{ runner.temp }}/android-build.log
          if-no-files-found: error

      - name: Upload debug APK
        if: steps.assemble.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: xiaokb-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Fail when Android compile fails
        if: steps.assemble.outcome == 'failure'
        run: exit 1
